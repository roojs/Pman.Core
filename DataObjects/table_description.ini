; Core module tables — used across Pman applications.
; Section per table: _description for the table; optional column keys for field hints.
; Joins come from pman.links.ini — do not repeat FK targets here.
; For core_enum columns: core_enum etype {EtypeName} (fetch core_enum with _etypes).

; --- People, companies, and projects ---

[core_person]
_description = "Back-office people: staff login accounts (email, password, permission groups) and external/client contact records in CRM-style apps. Do NOT use for club member correspondence — member email, tel, and postal address live on member_address (Hebe: Member dialog or Contacts dialog). Staff accounts: show_dialog AdminPerson with args { id: 0 }; not CorePersonContact or Hebe Contacts."
active = "1 = active account, 0 = disabled"
email = "Login email for staff accounts; also used as contact email on external contact records"
deleted_by = "Non-zero staff id if person was soft-deleted"
chosen_title = "Nickname or preferred name"
lang = "Preferred UI language code"
no_reset_sent = "Count of password-reset emails sent"
passwd = "Hashed password (never expose in fetch columns)"

[core_company]
_description = "Companies and clients: agencies, owners, and customer organisations"
comptype = "Legacy company type string (prefer comptype_id)"
comptype_id = "core_enum etype comptype"
is_system = "1 = internal system company (e.g. owner org)"
deleted_by = "Non-zero staff id if company was soft-deleted"
parent_id = "Parent company id for corporate hierarchies"
dispatch_port = "FTP or dispatch port for partner file delivery"

[core_company_type]
_description = "Deprecated company type labels; prefer core_enum comptype"

[core_office]
_description = "Office locations belonging to a company"

[core_project]
_description = "Projects and campaigns: client work scoped by date, team, and geography"
type = "Project type code (P = standard project)"
active = "1 = active project"
deleted_by = "Non-zero staff id if project was soft-deleted"
open_date = "Project start date"
close_date = "Project end date"
countries = "Comma-separated country codes for project scope"
languages = "Comma-separated language codes for project scope"
file_location = "Document storage path or reference"

[core_project_directory]
_description = "People and companies assigned to a project (team membership)"
ispm = "1 = project manager for this assignment"
role = "Role label on the project team"
crm_person_id = "crm_person id when team member is a CRM contact not a core_person login"

[core_project_group]
_description = "Permission groups scoped to a project"

; --- Security and permissions ---

[core_group]
_description = "Named permission groups (e.g. Administrators)"
leader = "core_person id of group leader"

[core_group_member]
_description = "People belonging to a permission group"

[core_group_right]
_description = "Permission grants assigned to a group"

[core_ip_access]
_description = "IP allow/deny rules for access control"

; --- Domains, email, and content ---

[core_domain]
_description = "Registered internet domains used by the system"
domain = "Hostname (unique)"
has_mx = "1 = domain has MX records"
has_ipv6 = "1 = domain has IPv6 addresses"
mx_updated = "Last MX lookup datetime"
no_mx_dt = "Datetime when missing MX was first detected"

[core_email]
_description = "Stored email templates and outbound message definitions"
is_system = "1 = system template, 0 = user-owned"
active = "1 = template available for sending"
use_file = "When set, body loaded from this file path instead of bodytext"
test_class = "PHP test class with static test_{name} method for template validation"
daily_email_limit = "Max sends per recipient per day for this template"
to_group_id = "core_group id for recipients (-1 = default)"
bcc_group_id = "core_group id for bcc (-1 = default)"

[core_template]
_description = "Reusable document templates (non-email)"

[core_template_element]
_description = "Building blocks within a document template"

[core_templatestr]
_description = "Nested template string fragments included in templates"

[images]
_description = "Uploaded files and images attached to records"
ontable = "Parent table name (polymorphic attachment)"
onid = "Parent row id in ontable"
imgtype = "Image type label (LOGO, DOCUMENT, IMAGE, etc.)"
displayorder = "Sort order among images on the parent record"
is_deleted = "1 = soft-deleted image"
parent_image_id = "Parent image when this row is a variant or page"

[core_image_type]
_description = "Image type classifications"

; --- Notifications ---

[core_notify]
_description = "Outbound notification and email queue (pending and recently sent). LARGE TABLE — always filter fetch_data: sent or act_when (date range), person_id, ontable+onid, evtype, to_email, or event_id."
evtype = "Notification handler type or method name"
act_when = "Scheduled send datetime"
act_start = "When the mail worker picked up this message"
sent = "Actual send datetime (NULL or future = still queued)"
ontable = "Target table name (polymorphic)"
onid = "Target row id in ontable"
person_table = "Person table when person_id is not core_person (e.g. pressrelease_contact)"
to_email = "Recipient email address for this send"
recur_id = "core_notify_recur id when this send is from a recurring schedule"
reject_match_id = "mail_reject_match rule id if bounced"

[core_notify_archive]
_description = "Archived sent notifications (same schema as core_notify). LARGE TABLE — always filter fetch_data: sent or act_when (date range), person_id, ontable+onid, evtype, to_email, or event_id."
sent = "Actual send datetime"
evtype = "Notification handler type or method name"

[core_notify_blacklist]
_description = "Blocked notification recipients by server and domain"

[core_notify_recur]
_description = "Recurring notification schedules"
last_event_id = "Last Events id that triggered this recurrence"

[core_notify_sender]
_description = "Configured notification sender profiles (from addresses)"

[core_notify_sender_blacklist]
_description = "Blocked sender addresses for notifications"

[core_notify_server]
_description = "Outbound mail/notification server configuration"

[core_notify_server_ipv6]
_description = "IPv6 addresses for notification servers"

; --- System and reference data ---

[core_enum]
_description = "Lookup option lists for dropdowns and status columns across the system; rows are grouped by etype"
etype = "Type category — filter core_enum by this (_etypes) to list valid values for a column"
name = "Internal value key stored in FK columns"
display_name = "Human-readable label shown in the UI"
active = "1 = active option, 0 = inactive"

[core_setting]
_description = "System-wide key/value configuration settings"

[core_curr_rate]
_description = "Currency exchange rates by date"

[core_holiday]
_description = "Public holidays by country"

[core_locking]
_description = "Record edit locks to prevent concurrent changes"

[core_heartbeat]
_description = "Background job and service heartbeat timestamps"

[core_watch]
_description = "User watch/subscription records: triggers notifications on entity changes"
ontable = "Watched table name"
onid = "Watched row id"
event = "Event name to watch for (e.g. update, delete)"
medium = "Notification medium (e.g. email)"
active = "1 = watch is active"
no_minutes = "Debounce interval in minutes between notifications"

[core_cache_yahoo]
_description = "Cached Yahoo finance data"

; --- Audit and events ---

[events]
_description = "System event log: user actions and audit trail. LARGE TABLE — always filter fetch_data: event_when (date range), person_id, on_table+on_id, action, or person_table."
event_when = "When the action occurred"
action = "Action code or label (e.g. login, update, delete)"
on_table = "Affected record table name"
on_id = "Affected record id in on_table"
person_table = "Table name for person_id when not core_person"
person_name = "Display name captured at event time (denormalized)"
dupe_id = "Non-zero when this event duplicates another Events row"
remarks = "Free-text event detail or JSON payload"

[core_events_archive]
_description = "Archived event log entries (same schema as events, older rows). LARGE TABLE — always filter fetch_data: event_when (date range), person_id, on_table+on_id, action, or person_table."
event_when = "When the action occurred"
action = "Action code or label"

[core_event_audit]
_description = "Field-level audit trail for data changes linked to an Events row. LARGE TABLE — filter by event_id only."
name = "Field or property name that changed"
newvalue = "Serialized new value after change"
old_audit_id = "Prior core_event_audit row in a change chain"

[core_event_audit_archive]
_description = "Archived field-level audit records. LARGE TABLE — filter by event_id only."

; --- Internationalisation ---

[i18n]
_description = "Translated strings for multi-language UI and content"

[translations]
_description = "Translation entries keyed by source text"

; --- Misc ---

[core_person_alias]
_description = "Alternate names or login aliases for a person"

[core_person_settings]
_description = "Per-user preference settings key/value store"

[core_person_signup]
_description = "Self-registration signup requests pending approval"

[core_person_window]
_description = "Saved UI window layout per user"

[proftp_groups]
_description = "FTP access group definitions"
