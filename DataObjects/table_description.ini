; Core module tables — used across Pman applications.
; Section per table: _description for the table; optional column keys for field hints.

; --- People, companies, and projects ---

[core_person]
_description = "System users and contacts: login accounts, staff, and client-side people"
name = "Full display name"
firstname = "Given name"
lastname = "Family name"
email = "Primary email address"
company_id = "FK to core_company — employer or client company"
office_id = "FK to core_office"
project_id = "Default or primary project"
active = "1 = active account, 0 = disabled"

[core_company]
_description = "Companies and clients: agencies, owners, and customer organisations"
name = "Company display name (searchable client name)"
code = "Short reference code"
comptype = "Company type: OWNER (system owner), CLIENT, AGENCY, etc."
parent_id = "FK to parent company for hierarchies"
country = "ISO country code"

[core_company_type]
_description = "Allowed company type labels and codes"

[core_office]
_description = "Office locations belonging to a company"

[core_project]
_description = "Projects and campaigns: client work scoped by date, team, and geography"
name = "Project or campaign display name"
code = "Short reference code"
client_id = "FK to core_company — client for this project"
type = "Project type flag"
active = "1 = active project"
open_date = "Project start date"
close_date = "Project end date"

[core_project_directory]
_description = "People and companies assigned to a project (team membership, PM flags)"

[core_project_group]
_description = "Permission groups scoped to a project"

